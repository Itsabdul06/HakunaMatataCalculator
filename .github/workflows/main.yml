name: Build CCTV Calculator EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: false
        default: 'release'
        type: choice
        options:
          - debug
          - release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install xlwings
        pip install reportlab
        pip install selenium
        pip install beautifulsoup4
    
    - name: List files for debugging
      run: |
        echo "Current directory contents:"
        dir
        echo ""
        echo "Python files:"
        dir *.py
    
    - name: Find Python script
      id: finder
      shell: pwsh
      run: |
        # Find the main Python file (exclude setup.py, test files, etc.)
        $pythonFile = Get-ChildItem -Filter "*.py" | Where-Object { $_.Name -notlike "test_*" -and $_.Name -notlike "*_test*" -and $_.Name -ne "setup.py" } | Select-Object -First 1
        
        if ($pythonFile) {
          echo "found=$($pythonFile.Name)" >> $env:GITHUB_OUTPUT
          echo "✅ Found Python file: $($pythonFile.Name)"
        } else {
          echo "❌ No Python file found!"
          exit 1
        }
    
    - name: Build executable
      shell: pwsh
      run: |
        $pythonFile = "${{ steps.finder.outputs.found }}"
        echo "Building: $pythonFile"
        
        pyinstaller --onefile `
          --name="CCTV_Calculator" `
          --add-data "Cameras_JSON.json;." `
          --hidden-import=xlwings `
          --hidden-import=win32com `
          --hidden-import=win32api `
          --hidden-import=win32con `
          --hidden-import=win32com.client `
          --hidden-import=webdriver_manager \
          --hidden-import=webdriver_manager.chrome \
          --hidden-import=selenium.webdriver.common.options \
          --collect-all webdriver_manager \
          --collect-all=xlwings `
          $pythonFile
    
    - name: Verify build
      run: |
        echo "Build completed. Checking for executable..."
        if (Test-Path "dist\CCTV_Calculator.exe") {
          echo "✅ Executable created successfully!"
          dir dist\
        } else {
          echo "❌ Executable not found!"
          exit 1
        }
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: CCTV_Calculator_Windows
        path: dist\CCTV_Calculator.exe
        retention-days: 30

    - name: Upload debug info (if build fails)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-debug-info
        path: |
          build\
          *.spec
        retention-days: 7
